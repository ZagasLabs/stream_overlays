<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Stream Overlays</title>
  </head>
  <body>
    <p><a href="./chat/">Open the chat overlay</a></p>
    <script>
      const chatUrl = new URL("./chat/", window.location.href);
      chatUrl.hash = window.location.hash;
      window.location.replace(chatUrl.href);
    </script>
  </body>
</html>
